# Example: HA Traefik (replicated) + certd on Swarm.
# /mnt/ceph/letsencrypt = your shared CephFS mount, present on all manager nodes.

version: "3.8"

services:
  traefik:
    image: traefik:v3.3
    command:
      - "--providers.swarm=true"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedbydefault=false"
      - "--providers.swarm.network=traefik-public"
      # file provider watches the certd-generated TLS config
      - "--providers.file.filename=/letsencrypt/traefik-tls.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # NOTE: no entrypoint-level redirect! It is a near-max-priority catch-all
      # that would also redirect ACME HTTP-01 challenges. The redirect lives in
      # a low-priority catch-all router on the certd service labels instead.
      # NOTE: no certificatesresolvers — ACME is fully external now
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host        # or ingress, depending on your LB strategy
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/ceph/letsencrypt:/letsencrypt:ro   # read-only: Traefik only consumes
    networks:
      - traefik-public
    deploy:
      mode: global                # one per manager = active-active ingress
      placement:
        constraints: [node.role == manager]
      update_config:
        parallelism: 1
        delay: 15s

  certd:
    image: registry.example.com/certd:latest   # built from the Dockerfile
    environment:
      ACME_EMAIL: "admin@hypeserv.com"
      DNS_PROVIDER: "cloudflare"               # any lego provider
      CLOUDFLARE_DNS_API_TOKEN_FILE: /run/secrets/cf_token
      STATIC_DOMAINS: "*.hypeserv.com,*.osrv.eu"
      # zones you control DNS for -> DNS-01; everything else -> HTTP-01
      DNS_ZONES: "hypeserv.com,osrv.eu"
      HTTP_CHALLENGE_PORT: "8402"
      EXCLUDE_REGEX: "\\.local$"
      INTERVAL: "300"
      # ACME_SERVER: https://acme-staging-v02.api.letsencrypt.org/directory  # test first!
    secrets:
      - cf_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/ceph/letsencrypt:/letsencrypt      # read-write: certd owns this dir
    networks:
      - traefik-public
    deploy:
      replicas: 1                 # exactly one — it is the single ACME writer
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 30s
      labels:
        - traefik.enable=true
        # 1) route ACME HTTP-01 challenges (any host) to lego's internal server
        - traefik.http.routers.acme.rule=PathPrefix(`/.well-known/acme-challenge/`)
        - traefik.http.routers.acme.entrypoints=web
        - traefik.http.routers.acme.priority=10000
        - traefik.http.services.acme.loadbalancer.server.port=8402
        # 2) catch-all HTTP->HTTPS redirect (replaces the entrypoint redirect)
        - traefik.http.routers.httpcatchall.rule=PathPrefix(`/`)
        - traefik.http.routers.httpcatchall.entrypoints=web
        - traefik.http.routers.httpcatchall.priority=1
        - traefik.http.routers.httpcatchall.middlewares=https-redirect
        - traefik.http.routers.httpcatchall.service=noop@internal
        - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https
        - traefik.http.middlewares.https-redirect.redirectscheme.permanent=true

networks:
  traefik-public:
    external: true

secrets:
  cf_token:
    external: true

# Services using traefik only need:
#   deploy.labels:
